openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Davomat tizimi API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: departments
    description: Department management
  - name: attendance
    description: Attendance management
  - name: leave
    description: Leave requests
  - name: reports
    description: Reports and analytics
  - name: shifts
    description: Work shifts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [superadmin, admin, employee]
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}/password:
    put:
      operationId: changeUserPassword
      tags: [users]
      summary: Change user password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    put:
      operationId: updateDepartment
      tags: [departments]
      summary: Update department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List all work shifts
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Create a work shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequest"
      responses:
        "201":
          description: Shift created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/{id}:
    put:
      operationId: updateShift
      tags: [shifts]
      summary: Update shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequest"
      responses:
        "200":
          description: Shift updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"
    delete:
      operationId: deleteShift
      tags: [shifts]
      summary: Delete shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shift deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [present, absent, late, early_leave, on_leave]
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Mark attendance manually (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceRequest"
      responses:
        "201":
          description: Attendance created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    put:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendanceRequest"
      responses:
        "200":
          description: Attendance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    delete:
      operationId: deleteAttendance
      tags: [attendance]
      summary: Delete attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /attendance/checkin:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Employee check-in (kelish)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "200":
          description: Checked in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/checkout:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Employee check-out (ketish)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutRequest"
      responses:
        "200":
          description: Checked out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance status for current user
      responses:
        "200":
          description: Today's attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAttendance"

  /leave:
    get:
      operationId: listLeaveRequests
      tags: [leave]
      summary: List leave requests
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: createLeaveRequest
      tags: [leave]
      summary: Create leave request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveRequest"
      responses:
        "201":
          description: Leave request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"

  /leave/{id}:
    put:
      operationId: updateLeaveRequest
      tags: [leave]
      summary: Approve/reject leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeaveRequest"
      responses:
        "200":
          description: Leave request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequest"
    delete:
      operationId: deleteLeaveRequest
      tags: [leave]
      summary: Delete leave request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get overall attendance summary
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: departmentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Summary report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /reports/employee/{userId}:
    get:
      operationId: getEmployeeReport
      tags: [reports]
      summary: Get attendance report for a specific employee
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Employee report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeReport"

  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      summary: Get daily attendance report
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: departmentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReportItem"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    ChangePasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
        currentPassword:
          type: string
      required:
        - newPassword

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [superadmin, admin, employee]
        departmentId:
          type: integer
          nullable: true
        departmentName:
          type: string
          nullable: true
        shiftId:
          type: integer
          nullable: true
        shiftName:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - firstName
        - lastName
        - role
        - isActive
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [superadmin, admin, employee]
        departmentId:
          type: integer
          nullable: true
        shiftId:
          type: integer
          nullable: true
        position:
          type: string
          nullable: true
        isActive:
          type: boolean
      required:
        - username
        - password
        - firstName
        - lastName
        - role

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [superadmin, admin, employee]
        departmentId:
          type: integer
          nullable: true
        shiftId:
          type: integer
          nullable: true
        position:
          type: string
          nullable: true
        isActive:
          type: boolean

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        managerId:
          type: integer
          nullable: true
        managerName:
          type: string
          nullable: true
        employeeCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - employeeCount
        - createdAt

    CreateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        managerId:
          type: integer
          nullable: true
      required:
        - name

    Shift:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        lateThresholdMinutes:
          type: integer
        workDays:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - startTime
        - endTime
        - lateThresholdMinutes
        - workDays
        - createdAt

    CreateShiftRequest:
      type: object
      properties:
        name:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        lateThresholdMinutes:
          type: integer
        workDays:
          type: array
          items:
            type: integer
      required:
        - name
        - startTime
        - endTime
        - lateThresholdMinutes
        - workDays

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userFullName:
          type: string
        departmentName:
          type: string
          nullable: true
        date:
          type: string
          format: date
        checkIn:
          type: string
          format: date-time
          nullable: true
        checkOut:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [present, absent, late, early_leave, on_leave]
        lateMinutes:
          type: integer
        earlyLeaveMinutes:
          type: integer
        workHours:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userFullName
        - date
        - status
        - lateMinutes
        - earlyLeaveMinutes
        - workHours
        - createdAt

    CreateAttendanceRequest:
      type: object
      properties:
        userId:
          type: integer
        date:
          type: string
          format: date
        checkIn:
          type: string
          format: date-time
          nullable: true
        checkOut:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [present, absent, late, early_leave, on_leave]
        note:
          type: string
          nullable: true
      required:
        - userId
        - date
        - status

    UpdateAttendanceRequest:
      type: object
      properties:
        checkIn:
          type: string
          format: date-time
          nullable: true
        checkOut:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [present, absent, late, early_leave, on_leave]
        note:
          type: string
          nullable: true

    CheckInRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true

    CheckOutRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true

    TodayAttendance:
      type: object
      properties:
        record:
          $ref: "#/components/schemas/AttendanceRecord"
          nullable: true
        checkedIn:
          type: boolean
        checkedOut:
          type: boolean
        checkInTime:
          type: string
          nullable: true
        checkOutTime:
          type: string
          nullable: true
      required:
        - checkedIn
        - checkedOut

    LeaveRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userFullName:
          type: string
        leaveType:
          type: string
          enum: [sick, vacation, personal, other]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        days:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewedById:
          type: integer
          nullable: true
        reviewedByName:
          type: string
          nullable: true
        reviewNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userFullName
        - leaveType
        - startDate
        - endDate
        - days
        - reason
        - status
        - createdAt

    CreateLeaveRequest:
      type: object
      properties:
        leaveType:
          type: string
          enum: [sick, vacation, personal, other]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: string
      required:
        - leaveType
        - startDate
        - endDate
        - reason

    UpdateLeaveRequest:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
        reviewNote:
          type: string
          nullable: true
      required:
        - status

    ReportSummary:
      type: object
      properties:
        totalEmployees:
          type: integer
        presentCount:
          type: integer
        absentCount:
          type: integer
        lateCount:
          type: integer
        onLeaveCount:
          type: integer
        attendanceRate:
          type: number
        avgWorkHours:
          type: number
        byDepartment:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentSummary"
      required:
        - totalEmployees
        - presentCount
        - absentCount
        - lateCount
        - onLeaveCount
        - attendanceRate
        - avgWorkHours
        - byDepartment

    DepartmentSummary:
      type: object
      properties:
        departmentId:
          type: integer
        departmentName:
          type: string
        totalEmployees:
          type: integer
        presentCount:
          type: integer
        absentCount:
          type: integer
        attendanceRate:
          type: number
      required:
        - departmentId
        - departmentName
        - totalEmployees
        - presentCount
